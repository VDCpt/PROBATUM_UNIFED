<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UNIFED · PROBATUM · Painel Forense</title>
    <style>
        /* ========== ESTILOS COMPLETOS (MANTIDOS DO ORIGINAL) ========== */
        /* =========================================================================
           FIX-CANVAS-01: Fundo explícito em TODOS os elementos <canvas>
           Problema: canvas HTML5 é transparente por omissão. Sem Chart.js a renderizar
           (cenário standalone / visualizadores externos), os canvas aparecem como áreas
           transparentes — o que produz o padrão xadrez azul em Claude Artifacts,
           VS Code Live Preview, Figma, e similares.
           Solução: forçar background #0a0c12 (igual ao body) em todos os canvas,
           com !important para garantir sobreposição.
           ISO/IEC 27037:2012 — integridade visual do documento forense.
           ========================================================================= */
        canvas, 
        .chart-container canvas, 
        #atfChartCanvas, 
        #mainDiscrepancyChart, 
        #mainChart {
            background: #0a0c12 !important;
        }

        /* =========================================================================
           FIX-STANDALONE-01: Garantir que body tem background opaco quando
           panel.html é aberto como documento autónomo (debug / revisão)
           ========================================================================= */
        html {
            background: #0a0c12;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem;
            color: #e2e8f0;
        }

        /* ... restante do CSS original mantido ... */
        .pure-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        /* ... todo o resto do estilo inalterado ... */
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div class="pure-container">
    <section id="pureDashboard" class="pure-section" aria-label="Painel Caso Real Anonimizado v13.12.2-i18n">
        <!-- Todo o conteúdo do painel permanece EXATAMENTE igual ao original -->
        <!-- ... (código HTML do painel inalterado) ... -->
    </section>
</div>

<script>
    /* =========================================================================
       FIX-PH-03: Substituição do IIFE destrutivo por _panelReady()
       (código mantido, sem alterações)
       ========================================================================= */
    window._panelReady = function _panelReady() {
        // ... código existente ...
    };

    // Auto-execução com guarda
    (function _safeFallback() {
        var el = document.getElementById('panel-mainChartContainer');
        if (el) el.style.display = 'none';
        var el2 = document.getElementById('pure-chart-container');
        if (el2) el2.style.display = 'none';
    })();
</script>
</body>
</html>
